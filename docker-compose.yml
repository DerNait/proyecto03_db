services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: puzzle_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - app-network
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy

  web:
    image: nginx:1.25-alpine
    container_name: puzzle_web
    restart: unless-stopped
    ports:
      - "8500:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: puzzle_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: puzzle_db
      MYSQL_USER: puzzle_user
      MYSQL_PASSWORD: puzzle_pass
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  node:
    image: node:20-alpine
    container_name: puzzle_node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: tail -f /dev/null
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
